name: ci

on:
  push:
    branches: [develop, main]
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check formatting
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            ghcr.io/mitchellthompkins/consteig_dev_image:latest \
            make check-format

  build-and-test:
    name: ${{ matrix.compiler }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout consteig dependency
        run: git clone --depth=1 --recurse-submodules https://github.com/mitchellthompkins/consteig ../consteig

      - name: Build and test
        run: |
          PARENT=$(dirname "$GITHUB_WORKSPACE")
          REPO=$(basename "$GITHUB_WORKSPACE")
          docker run --rm \
            -v "$PARENT:/work" \
            -w "/work/$REPO" \
            ghcr.io/mitchellthompkins/consteig_dev_image:latest \
            make test.${{ matrix.compiler }}
