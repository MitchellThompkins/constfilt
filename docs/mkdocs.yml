site_name: constfilt
site_url: https://mitchellthompkins.github.io/constfilt/
repo_url: https://github.com/mitchellthompkins/constfilt
repo_name: mitchellthompkins/constfilt
docs_dir: .

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Filter Design:
      - Butterworth: butterworth.md
      - Elliptic: elliptic.md
      - Discretization Methods: discretization.md
  - Development:
      - Building & Testing: building.md
      - Verification: verification.md
  - API Reference: api/index.html
